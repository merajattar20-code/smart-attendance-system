<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Attendance System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .main-container {
            width: 100%;
            padding: 20px;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            max-width: 450px;
            margin: 0 auto;
        }

        .main-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        .header-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .app-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .app-title i {
            color: #667eea;
            font-size: 38px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            font-weight: 400;
        }

        .divider {
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 60px;
            margin: 15px auto;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-label i {
            color: #667eea;
            font-size: 16px;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
        }

        .form-control:focus {
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.1);
            outline: none;
        }

        .form-control::placeholder {
            color: #999;
        }

        .attendance-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .attendance-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .attendance-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .attendance-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .status-container {
            margin-top: 25px;
        }

        .alert {
            border-radius: 12px;
            border: none;
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        .alert i {
            font-size: 18px;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .info-text {
            color: #666;
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .info-text i {
            color: #667eea;
            margin-right: 4px;
        }

        @media (max-width: 576px) {
            .main-card {
                padding: 30px 20px;
            }

            .app-title {
                font-size: 28px;
            }

            .attendance-btn {
                padding: 12px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

<div class="main-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="main-card">
                    <!-- Header Section -->
                    <div class="header-section">
                        <h1 class="app-title">
                            <i class="fas fa-map-marker-alt"></i>
                            Smart Attendance
                        </h1>
                        <p class="subtitle">Mark your attendance with location verification</p>
                        <div class="divider"></div>
                    </div>

                    <!-- Form Section -->
                    <form id="attendanceForm" onsubmit="return false;">
                        <div class="form-group">
                            <label class="form-label" for="name">
                                <i class="fas fa-user"></i>
                                Student Name
                            </label>
                            <input
                                type="text"
                                id="name"
                                class="form-control"
                                placeholder="Enter your full name"
                                autocomplete="name">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">
                                <i class="fas fa-envelope"></i>
                                Email Address
                            </label>
                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                placeholder="Enter your email"
                                autocomplete="email">
                        </div>

                        <button
                            type="button"
                            class="attendance-btn"
                            id="attendanceBtn"
                            onclick="markAttendance()">
                            <i class="fas fa-check-circle"></i>
                            Mark Attendance
                        </button>
                    </form>

                    <!-- Status Section -->
                    <div id="status" class="status-container"></div>

                    <!-- Info Text -->
                    <p class="info-text">
                        <i class="fas fa-lock"></i>
                        Your location will be used only for attendance verification
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function markAttendance() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let btn = document.getElementById("attendanceBtn");
    let statusDiv = document.getElementById("status");

    // Validation
    if (name === "" || email === "") {
        statusDiv.innerHTML = `
            <div class='alert alert-danger'>
                <i class='fas fa-exclamation-circle'></i>
                <span>Please fill all fields</span>
            </div>
        `;
        return;
    }

    // Email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        statusDiv.innerHTML = `
            <div class='alert alert-danger'>
                <i class='fas fa-exclamation-circle'></i>
                <span>Please enter a valid email address</span>
            </div>
        `;
        return;
    }

    // Update button state
    btn.innerHTML = "<span class='loading-spinner'></span> Checking Location...";
    btn.disabled = true;

    // Get geolocation
    navigator.geolocation.getCurrentPosition(
        function(position) {
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            // Send attendance data
            fetch("/mark-attendance", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: name,
                    email: email,
                    latitude: lat,
                    longitude: lon
                })
            })
            .then(res => res.json())
            .then(data => {
                btn.innerHTML = "<i class='fas fa-check-circle'></i> Mark Attendance";
                btn.disabled = false;

                if (data.status === "success") {
                    statusDiv.innerHTML = `
                        <div class='alert alert-success'>
                            <i class='fas fa-check-circle'></i>
                            <span>Attendance marked successfully!</span>
                        </div>
                    `;
                    // Clear form
                    document.getElementById("attendanceForm").reset();
                } else {
                    statusDiv.innerHTML = `
                        <div class='alert alert-danger'>
                            <i class='fas fa-times-circle'></i>
                            <span>${data.message || "Failed to mark attendance"}</span>
                        </div>
                    `;
                }
            })
            .catch(error => {
                btn.innerHTML = "<i class='fas fa-check-circle'></i> Mark Attendance";
                btn.disabled = false;
                statusDiv.innerHTML = `
                    <div class='alert alert-danger'>
                        <i class='fas fa-times-circle'></i>
                        <span>An error occurred. Please try again.</span>
                    </div>
                `;
            });
        },
        function(error) {
            btn.innerHTML = "<i class='fas fa-check-circle'></i> Mark Attendance";
            btn.disabled = false;
            statusDiv.innerHTML = `
                <div class='alert alert-danger'>
                    <i class='fas fa-map-marker-alt'></i>
                    <span>Location access is required to mark attendance</span>
                </div>
            `;
        }
    );
}
</script>

</body>

</html>
