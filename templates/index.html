<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Attendance System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-4 col-md-6">

<div class="main-card">

<h3 class="app-title">
📍 Smart Attendance
</h3>

<div class="mb-3">

<label class="form-label">
Student Name
</label>

<input
type="text"
id="name"
class="form-control"
placeholder="Enter your full name">

</div>

<div class="mb-3">

<label class="form-label">
Email Address
</label>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter your email">

</div>

<div class="d-grid">

<button
class="attendance-btn"
id="attendanceBtn"
onclick="markAttendance()">

Mark Attendance

</button>

</div>

<div id="status" class="text-center"></div>

</div>

</div>

</div>

</div>

<script>

function markAttendance(){

let name = document.getElementById("name").value
let email = document.getElementById("email").value
let btn = document.getElementById("attendanceBtn")

if(name=="" || email==""){

document.getElementById("status").innerHTML =
"<div class='alert alert-danger mt-3'>Please fill all fields</div>"

return

}

btn.innerText = "Checking Location..."
btn.disabled = true

navigator.geolocation.getCurrentPosition(function(position){

let lat = position.coords.latitude
let lon = position.coords.longitude

fetch("/mark-attendance",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,
email:email,
latitude:lat,
longitude:lon

})

})

.then(res=>res.json())

.then(data=>{

btn.innerText = "Mark Attendance"
btn.disabled = false

if(data.status=="success"){

document.getElementById("status").innerHTML =
"<div class='alert alert-success mt-3'>Attendance Marked Successfully</div>"

}

else{

document.getElementById("status").innerHTML =
"<div class='alert alert-danger mt-3'>"+data.message+"</div>"

}

})

}).catch(()=>{

btn.innerText = "Mark Attendance"
btn.disabled = false

document.getElementById("status").innerHTML =
"<div class='alert alert-danger mt-3'>Location access required</div>"

})

}

</script>

</body>

</html>
